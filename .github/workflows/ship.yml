name: Ship to TestFlight

on:
  push:
    branches: [ main, "release/*" ]
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      skip_upload:
        description: 'Skip TestFlight upload (debug)'
        required: false
        default: 'false'

concurrency:
  group: ship-${{ github.ref }}
  cancel-in-progress: true

jobs:
  archive-and-upload:
    name: Archive + TestFlight upload
    runs-on: [ self-hosted, macOS, ios-build ]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - name: App Group entitlement gate
        run: |
          ENT_FILE="WraithVPN/WraithVPN.entitlements"
          EXPECTED="group.com.katafract.enclave"
          if [ ! -f "$ENT_FILE" ]; then
            echo "::error file=$ENT_FILE::Entitlements file not found"
            exit 1
          fi
          if ! grep -q "$EXPECTED" "$ENT_FILE"; then
            echo "::error file=$ENT_FILE::Missing App Group $EXPECTED"
            exit 1
          fi
          echo "::notice::App Group $EXPECTED present"

      - name: Notify Matrix - Workflow started
        if: always()
        run: |
          PAYLOAD="{\"text\":\"🏃 \${{ github.repository }} · run #\${{ github.run_number }} · ref \${{ github.ref_name }} · picked up by \${{ runner.name }}\"}"
          curl -s -X POST https://webhooks.katafract.io/webhook/github \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: \${{ secrets.MATRIX_WEBHOOK_SECRET }}" \
            -d "\$PAYLOAD" || true

      - name: Clone sibling KatafractStyle
        run: |
          PARENT="$(dirname "$GITHUB_WORKSPACE")"
          if [ ! -d "$PARENT/KatafractStyle/.git" ]; then
            git clone --depth 1 https://github.com/katafract-io/KatafractStyle "$PARENT/KatafractStyle"
          else
            git -C "$PARENT/KatafractStyle" fetch --depth 1 origin main && git -C "$PARENT/KatafractStyle" reset --hard origin/main
          fi

      - name: Load runner env
        run: |
          if [ ! -f "$HOME/runner-env/wraith.env" ]; then
            echo "::error::Missing $HOME/runner-env/wraith.env"; exit 1
          fi
          grep -v '^#' "$HOME/runner-env/wraith.env" | grep '=' >> "$GITHUB_ENV"

      - name: Ensure ASC private key on disk (local file or secret fallback)
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          if [ ! -f "$ASC_KEY_PATH" ]; then
            if [ -n "$ASC_PRIVATE_KEY" ]; then
              mkdir -p "$(dirname "$ASC_KEY_PATH")"
              printf '%s' "$ASC_PRIVATE_KEY" > "$ASC_KEY_PATH"
              chmod 600 "$ASC_KEY_PATH"
              echo "wrote ASC key from secret"
            else
              echo "::error::no ASC_PRIVATE_KEY secret and no local file at $ASC_KEY_PATH"; exit 1
            fi
          else
            echo "using local ASC key at $ASC_KEY_PATH"
          fi

      - name: Unlock keychain
        run: |
          security unlock-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 7200 "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN" >/dev/null 2>&1

      - name: Resolve SPM
        run: xcodebuild -project WraithVPN.xcodeproj -scheme WraithVPN -resolvePackageDependencies 2>&1 | tail -5

      - name: Bump CFBundleVersion
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_ID: ${{ secrets.APP_ID }}
        run: |
          set -eo pipefail
          JWT=$(python3 ~/runner-env/asc-jwt.py 2>&1 || true)
          if [ -z "$JWT" ] || ! echo "$JWT" | grep -q '^ey'; then
            echo "::warning::ASC JWT generation failed, falling back to run-number-only bump"
            BUILD_NUM=$((GITHUB_RUN_NUMBER + 400))
          else
            ASC_MAX=$(curl -s -m 10 -H "Authorization: Bearer $JWT" \
              "https://api.appstoreconnect.apple.com/v1/builds?filter[app]=$APP_ID&sort=-version&limit=1&fields[builds]=version" \
              | python3 -c 'import sys,json; d=json.load(sys.stdin).get("data") or [{}]; v=(d[0].get("attributes") or {}).get("version") or "0"; print(int(v) if v.isdigit() else 0)' 2>/dev/null || echo 0)
            ASC_MAX=${ASC_MAX:-0}
            RUN_BUILD=$((GITHUB_RUN_NUMBER + 400))
            if [ "$ASC_MAX" -ge "$RUN_BUILD" ]; then
              BUILD_NUM=$((ASC_MAX + 1))
            else
              BUILD_NUM=$RUN_BUILD
            fi
            echo "asc_max=$ASC_MAX run_based=$RUN_BUILD using=$BUILD_NUM"
          fi

          # Restore pbxproj CURRENT_PROJECT_VERSION bump (dropped in 44c763c5)
          find . -name project.pbxproj -not -path "*/.git/*" -exec sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9][0-9]*/CURRENT_PROJECT_VERSION = $BUILD_NUM/g" {} +

          # Verifying plist bump — fail loudly if zero bumped
          BUMPED=0
          while IFS= read -r f; do
            OLD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$f" 2>/dev/null) || continue
            if /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" "$f" 2>/dev/null; then
              NEW=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$f" 2>/dev/null)
              if [ "$NEW" = "$BUILD_NUM" ]; then
                echo "  bumped $f: $OLD -> $NEW"
                BUMPED=$((BUMPED+1))
              fi
            fi
          done < <(find . -name "*.plist" -not -path "*/build/*" -not -path "*/.build/*" -not -path "*/.git/*")
          echo "Total plists bumped: $BUMPED"
          if [ "$BUMPED" -eq 0 ]; then
            echo "::error::No CFBundleVersion plists were bumped — check Info.plist path and contents"
            exit 1
          fi

          echo "BUILD_NUM=$BUILD_NUM" >> "$GITHUB_ENV"

      - name: Clean
        run: xcodebuild -project WraithVPN.xcodeproj -scheme WraithVPN -destination "generic/platform=iOS" clean

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild -project WraithVPN.xcodeproj -scheme WraithVPN \
            -configuration Release -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CURRENT_PROJECT_VERSION=$BUILD_NUM archive 2>&1 | tee /tmp/archive.log | grep -E "error:|warning:|\*\* |Signing Identity" | tail -30
          if [ ! -f "$ARCHIVE_PATH/Info.plist" ]; then
            echo "::error::archive incomplete"; tail -80 /tmp/archive.log; exit 1
          fi

      - name: Force-embed .appex extensions from archive's own UninstalledProducts
        run: |
          APP=$(ls -d "$ARCHIVE_PATH/Products/Applications/"*.app | head -1)
          mkdir -p "$APP/PlugIns"
          SRC="$HOME/Library/Developer/Xcode/DerivedData/Build/Intermediates.noindex/ArchiveIntermediates/WraithVPN/IntermediateBuildFilesPath/UninstalledProducts/iphoneos"
          if [ ! -d "$SRC" ]; then
            echo "(no UninstalledProducts — single-target app)"
            exit 0
          fi
          for ext in "$SRC"/*.appex; do
            [ -e "$ext" ] || continue
            BN=$(basename "$ext")
            rm -rf "$APP/PlugIns/$BN"
            cp -R "$ext" "$APP/PlugIns/"
            echo "embedded $BN"
          done
          ls -la "$APP/PlugIns/" 2>/dev/null || echo "(no extensions)"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -exportPath "$EXPORT_PATH" 2>&1 | grep -E "error:|\*\* " | tail -10
          ls -la "$EXPORT_PATH"

      - name: Notify Matrix - Archive succeeded
        if: success()
        run: |
          PAYLOAD="{\"text\":\"✅ \${{ github.repository }} #\$BUILD_NUM archived (run #\${{ github.run_number }})\"}"
          curl -s -X POST https://webhooks.katafract.io/webhook/ci \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: \${{ secrets.MATRIX_WEBHOOK_SECRET }}" \
            -d "\$PAYLOAD" || true

      - name: Notify Matrix - Archive FAILED
        if: failure()
        run: |
          RUN_URL="\${{ github.server_url }}/\${{ github.repository }}/actions/runs/\${{ github.run_id }}"
          PAYLOAD="{\"text\":\"🔴 \${{ github.repository }} #\$BUILD_NUM archive FAILED — \$RUN_URL\"}"
          for ROOM in ci alerts; do
            curl -s -X POST "https://webhooks.katafract.io/webhook/\$ROOM" \
              -H "Content-Type: application/json" \
              -H "X-Webhook-Secret: \${{ secrets.MATRIX_WEBHOOK_SECRET }}" \
              -d "\$PAYLOAD" || true
          done

      - name: Upload to TestFlight
        if: success() && github.event.inputs.skip_upload != 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --upload-app -f "$EXPORT_PATH"/*.ipa -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID" 2>&1 | tee /tmp/altool.log | tail -20
          grep -q "UPLOAD SUCCEEDED" /tmp/altool.log

      - name: Distribute to Internal Testing
        if: success() && github.event.inputs.skip_upload != 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_ID: ${{ secrets.APP_ID }}
        run: |
          set +e
          JWT=$(python3 ~/runner-env/asc-jwt.py)
          if [ -z "$JWT" ]; then echo "::warning::no ASC JWT, skipping internal-tester distribution"; exit 0; fi
          GROUPS=$(curl -s -H "Authorization: Bearer $JWT" "https://api.appstoreconnect.apple.com/v1/apps/$APP_ID/betaGroups?limit=50&fields[betaGroups]=name,isInternalGroup")
          GROUP_ID=$(echo "$GROUPS" | python3 -c 'import sys,json;d=json.load(sys.stdin).get("data",[]); ids=[g["id"] for g in d if g["attributes"].get("isInternalGroup")]; print(ids[0] if ids else "")')
          if [ -z "$GROUP_ID" ]; then echo "::warning::no internal beta group; skipping"; exit 0; fi
          echo "internal_group_id=$GROUP_ID"
          BUILD_ID=""; STATE=""
          for i in $(seq 1 30); do
            BUILDS=$(curl -s -H "Authorization: Bearer $JWT" "https://api.appstoreconnect.apple.com/v1/builds?filter[app]=$APP_ID&filter[version]=$BUILD_NUM&limit=1&fields[builds]=processingState")
            BUILD_ID=$(echo "$BUILDS" | python3 -c 'import sys,json;d=json.load(sys.stdin).get("data",[]); print(d[0]["id"] if d else "")')
            STATE=$(echo "$BUILDS" | python3 -c 'import sys,json;d=json.load(sys.stdin).get("data",[]); print((d[0]["attributes"].get("processingState") if d else ""))')
            echo "poll $i build=$BUILD_ID state=$STATE"
            [ "$STATE" = "VALID" ] && break
            sleep 30
          done
          if [ "$STATE" != "VALID" ] || [ -z "$BUILD_ID" ]; then
            echo "::warning::build did not reach VALID in 15min; tester distribution skipped"
            exit 0
          fi
          RESP=$(curl -s -w "\n%{http_code}" -X POST -H "Authorization: Bearer $JWT" -H "Content-Type: application/json" \
            "https://api.appstoreconnect.apple.com/v1/builds/$BUILD_ID/relationships/betaGroups" \
            -d "{\"data\":[{\"type\":\"betaGroups\",\"id\":\"$GROUP_ID\"}]}")
          CODE=$(echo "$RESP" | tail -1)
          echo "attach response code=$CODE"
          if [ "$CODE" = "204" ] || [ "$CODE" = "201" ]; then
            curl -s -X POST https://webhooks.katafract.io/webhook/deploys \
              -H "Content-Type: application/json" \
              -H "X-Webhook-Secret: ${{ secrets.MATRIX_WEBHOOK_SECRET }}" \
              -d "{\"text\":\"📲 ${{ github.repository }} build $BUILD_NUM distributed to Internal Testing\"}" || true
          else
            curl -s -X POST https://webhooks.katafract.io/webhook/alerts \
              -H "Content-Type: application/json" \
              -H "X-Webhook-Secret: ${{ secrets.MATRIX_WEBHOOK_SECRET }}" \
              -d "{\"text\":\"⚠️ ${{ github.repository }} build $BUILD_NUM upload OK but tester attach failed (HTTP $CODE)\"}" || true
          fi
          set -e

      - name: Notify Matrix - TestFlight upload succeeded
        if: success() && github.event.inputs.skip_upload != 'true'
        run: |
          UUID=$(grep -oE 'Delivery UUID: [a-f0-9-]+' /tmp/altool.log 2>/dev/null | head -1 | cut -d' ' -f3 || echo "unknown")
          IPA_SIZE=$(ls -lh "$EXPORT_PATH"/*.ipa 2>/dev/null | awk '{print $5}' || echo "?")
          PAYLOAD="{\"text\":\"🚀 \${{ github.repository }} #\$BUILD_NUM uploaded to TestFlight (delivery \$UUID) · IPA \$IPA_SIZE\"}"
          curl -s -X POST https://webhooks.katafract.io/webhook/deploys \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: \${{ secrets.MATRIX_WEBHOOK_SECRET }}" \
            -d "\$PAYLOAD" || true

      - name: Notify Matrix - TestFlight upload FAILED
        if: failure() && github.event.inputs.skip_upload != 'true'
        run: |
          RUN_URL="\${{ github.server_url }}/\${{ github.repository }}/actions/runs/\${{ github.run_id }}"
          PAYLOAD="{\"text\":\"🔴 \${{ github.repository }} #\$BUILD_NUM TestFlight upload FAILED — \$RUN_URL\"}"
          for ROOM in deploys alerts; do
            curl -s -X POST "https://webhooks.katafract.io/webhook/\$ROOM" \
              -H "Content-Type: application/json" \
              -H "X-Webhook-Secret: \${{ secrets.MATRIX_WEBHOOK_SECRET }}" \
              -d "\$PAYLOAD" || true
          done

      - name: Summary
        if: always()
        run: |
          if grep -q "UPLOAD SUCCEEDED" /tmp/altool.log 2>/dev/null; then
            UUID=$(grep -oE 'Delivery UUID: [a-f0-9-]+' /tmp/altool.log | head -1 | cut -d' ' -f3)
            echo "- Build $BUILD_NUM uploaded, Delivery UUID $UUID" >> "$GITHUB_STEP_SUMMARY"
          fi
